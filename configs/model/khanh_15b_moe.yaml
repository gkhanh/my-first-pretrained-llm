# khanh_15b_moe.yaml — STRETCH config (decide after 150M smoke tests)
# ~1.5B total params / ~700M active params per token
# Every other FFN replaced by 8-expert top-2 MoE layer
# Fits ~13.5 GB VRAM (bf16 + AdamW8bit + full activation checkpointing, micro-batch 1)
# Only switch to this if khanh_150m smoke tests show stable training AND you accept higher instability risk.
# See docs/01-architecture.md "Stretch Goal" section.

name: khanh_15b_moe

hidden_dim: 2048
num_layers: 22
num_heads_q: 16
num_heads_kv: 4
ffn_dim: 5504

vocab_size: 49152
max_seq_len: 2048
rope_base: 500000

dropout: 0.0
tied_embeddings: true

use_moe: true
moe_every_n_layers: 2  # Replace every other FFN with MoE (layers 1,3,5,...21 = 11 MoE layers)
num_experts: 8
num_experts_active: 2  # Top-2 routing
aux_loss_weight: 0.01  # Switch Transformer differentiable balance loss

# lora_local.yaml — LoRA fine-tuning on a KhanhLLM checkpoint
# Works on khanh_150m, khanh_700m, khanh_1b checkpoints.
# ~10 GPU-hours to add a new language / narrow domain.

run_name: khanh_1b_lora
run_dir: runs

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

micro_batch_size: 4
gradient_accumulation_steps: 8
peak_lr: 3.0e-4
min_lr:  3.0e-5
warmup_steps: 50
weight_decay: 0.01
max_grad_norm: 1.0
dtype: bfloat16
num_epochs: 3
use_wandb: false

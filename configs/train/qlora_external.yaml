# qlora_external.yaml — QLoRA fine-tuning on an external HuggingFace base model
# Default: Qwen/Qwen2.5-1.5B (code-aware, fits comfortably in 16 GB with QLoRA).
# Swap base_model to run on Llama-3.2-1B, Mistral-7B, Qwen2.5-7B, etc.

run_name: qlora_qwen25_15b
run_dir: runs

# External base model (any HuggingFace causal-LM identifier)
base_model: Qwen/Qwen2.5-1.5B
# Alternatives:
# base_model: meta-llama/Llama-3.2-1B
# base_model: Qwen/Qwen2.5-7B          # fits in 16 GB with 4-bit
# base_model: mistralai/Mistral-7B-v0.3 # fits in 16 GB with 4-bit

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

micro_batch_size: 2
gradient_accumulation_steps: 16
peak_lr: 2.0e-4
min_lr:  2.0e-5
warmup_steps: 100
weight_decay: 0.01
max_grad_norm: 1.0
dtype: bfloat16
num_epochs: 2
use_wandb: false
